    <style>
        body { cursor: none !important; }
        
        #cursor-dot, #cursor-outline {
            display: none;
            pointer-events: none;
            position: fixed;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 999999 !important;
        }
        
        #cursor-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-color, #ff3b3b);
            box-shadow: 0 0 10px var(--accent-color, #ff3b3b);
        }

        #cursor-outline {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: width 0.15s, height 0.15s, background-color 0.15s;
        }

        body.hovering #cursor-outline {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent-color, #ff3b3b);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.005) !important;
            backdrop-filter: blur(2px) !important;
            -webkit-backdrop-filter: blur(2px) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1) !important;
        }

        .activity-card {
            background: rgba(40, 40, 40, 0.45) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.03) !important;
        }

        .anim-item {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }
        
        .anim-active {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        #click-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            z-index: 99998;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.6s ease, visibility 0.6s;
        }

        .click-text {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1.5rem;
            color: #fff;
            letter-spacing: 2px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .view-counter {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #ddd;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .view-counter.show {
            opacity: 1;
        }

        .bio-container {
            min-height: 28px;
            display: block;
            margin-bottom: 20px;
        }

        .tooltip-copy {
            position: fixed;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: #23a559;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 10000;
            pointer-events: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>

    <script>
        const cursorDot = document.getElementById("cursor-dot");
        const cursorOutline = document.getElementById("cursor-outline");

        if (window.innerWidth >= 992) {
            window.addEventListener("mousemove", function(e) {
                if (cursorDot.style.display !== 'block') {
                    cursorDot.style.display = 'block';
                    cursorOutline.style.display = 'block';
                }
                
                const posX = e.clientX;
                const posY = e.clientY;

                cursorDot.style.left = `${posX}px`;
                cursorDot.style.top = `${posY}px`;
                
                cursorOutline.animate({
                    left: `${posX}px`,
                    top: `${posY}px`
                }, { duration: 100, fill: "forwards" });
            });

            window.addEventListener('mousedown', () => {
                cursorOutline.style.transform = "translate(-50%, -50%) scale(0.7)";
            });
            window.addEventListener('mouseup', () => {
                cursorOutline.style.transform = "translate(-50%, -50%) scale(1)";
            });
            const hoverTargets = document.querySelectorAll('a, button, .music-widget, .glass-card, .link-item, #click-overlay, .copy-btn, .return-btn');
            hoverTargets.forEach(el => {
                el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
                el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
            });
        }

        // ==== FLIP CARD FUNCTION ====
        function toggleBank(showBank) {
            const card = document.getElementById('main-card');
            card.classList.remove('animate-jump', 'animate-return');
            void card.offsetWidth; // Force reflow

            if (showBank) {
                card.classList.add('animate-jump');
                setTimeout(() => { 
                    card.classList.add('is-flipped'); 
                }, 100);
            } else {
                card.classList.add('animate-return');
                setTimeout(() => { 
                    card.classList.remove('is-flipped'); 
                }, 100);
            }
        }

        // ==== COPY TO CLIPBOARD FUNCTION ====
        function copyToClipboard(text) {
            if(!text) return;
            navigator.clipboard.writeText(text).then(() => {
                const tooltip = document.getElementById('tooltip-copy');
                tooltip.style.opacity = '1';
                setTimeout(() => { 
                    tooltip.style.opacity = '0'; 
                }, 2000);
            });
        }

        const overlay = document.getElementById('click-overlay');
        const videoBg = document.getElementById('bg-video'); 
        const audioTag = document.getElementById('bg-music');
        const viewCounter = document.getElementById('view-counter');
        const playIcon = document.getElementById('play-icon');
        const musicStatus = document.getElementById('music-status');
        const vinyl = document.querySelector('.music-icon-spin');
        const originalBio = "Uy tín có thừa chỉ thiếu tiền";
        const lastOnlineTimestamp = 1773672604992;
        let typedInstance = null;
        let isOfflineMode = false;
        let hasClicked = false;

        if (videoBg) {
            videoBg.muted = true;
            videoBg.setAttribute('playsinline', 'true');
            videoBg.setAttribute('webkit-playsinline', 'true');
            
            const isEdge = /Edge|Edg/.test(navigator.userAgent);
            if (isEdge) {
                const src = videoBg.querySelector('source').src;
                videoBg.querySelector('source').src = '';
                videoBg.load();
                videoBg.querySelector('source').src = src;
            }
            videoBg.load();
        }

        document.documentElement.style.setProperty('--accent-color', getComputedStyle(document.documentElement).getPropertyValue('--accent-color') || '#ff3b3b');
        document.documentElement.style.setProperty('--discord-online', '#23a559');
        document.documentElement.style.setProperty('--discord-idle', '#f0b232');
        document.documentElement.style.setProperty('--discord-dnd', '#f23f43');
        document.documentElement.style.setProperty('--discord-offline', '#80848e');

        function setPlayingUI() {
            if(playIcon) playIcon.className = "fas fa-pause";
            if(musicStatus) { musicStatus.innerText = "Playing..."; musicStatus.style.color = "#23a559"; }
            if(vinyl) vinyl.style.animationPlayState = "running";
        }

        function setPausedUI() {
            if(playIcon) playIcon.className = "fas fa-play";
            if(musicStatus) { musicStatus.innerText = "Paused/Muted"; musicStatus.style.color = "#aaa"; }
            if(vinyl) vinyl.style.animationPlayState = "paused";
        }

        if(overlay) {
            overlay.addEventListener('click', () => {
                if(hasClicked) return;
                hasClicked = true;

                overlay.style.opacity = '0'; 
                overlay.style.visibility = 'hidden';
                
                const items = document.querySelectorAll('.anim-item');
                items.forEach((item, index) => { 
                    setTimeout(() => { 
                        item.classList.add('anim-active'); 
                    }, index * 100); 
                });

                setTimeout(() => {
                     startTyped(originalBio);
                }, 300);

                if (videoBg) {
                    videoBg.muted = false;
                    videoBg.play().then(setPlayingUI).catch(e => {
                        console.log("Video playback blocked");
                        setPausedUI();
                    });
                } else if (audioTag) {
                    audioTag.play().then(setPlayingUI).catch(err => setPausedUI());
                }
                
                if(viewCounter) viewCounter.classList.add('show');
            });
        }

        function toggleMusic() {
            if (videoBg) {
                if (videoBg.muted) {
                    videoBg.muted = false;
                    setPlayingUI();
                } else {
                    videoBg.muted = true;
                    setPausedUI();
                }
            } else if (audioTag) {
                if (audioTag.paused) { 
                    audioTag.play();
                    setPlayingUI(); 
                } else { 
                    audioTag.pause();
                    setPausedUI(); 
                }
            }
        }

        function startTyped(text) {
            if(typedInstance) { 
                typedInstance.destroy();
            }
            if(!text || text.trim() === "") return;

            typedInstance = new Typed('#typed-bio', { 
                strings: [text], 
                typeSpeed: 40, 
                backSpeed: 20, 
                startDelay: 100, 
                backDelay: 3000, 
                loop: true, 
                showCursor: true, 
                cursorChar: '|',
                autoInsertCss: true 
            });
        }

        VanillaTilt.init(document.querySelector(".glass-card"), { 
            max: 12, speed: 400, glare: true, "max-glare": 0.15, scale: 1.01 
        });

        function formatTimeAgo(timestamp) {
            const diff = Date.now() - timestamp;
            const minutes = Math.floor(diff / 60000);
            if(minutes < 1) return "vài giây trước";
            if(minutes < 60) return `${minutes} phút trước`;
            const hours = Math.floor(minutes / 60);
            if(hours < 24) return `${hours} giờ trước`;
            return `${Math.floor(hours/24)} ngày trước`;
        }

        const DISCORD_ID = "598301893877432341";
        const lanyard = new WebSocket("wss://api.lanyard.rest/socket");
        let heartbeatInterval;

        lanyard.onopen = () => { 
            lanyard.send(JSON.stringify({ op: 2, d: { subscribe_to_id: DISCORD_ID } }));
        };

        lanyard.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data.op === 1) { 
                    heartbeatInterval = setInterval(() => { 
                        lanyard.send(JSON.stringify({ op: 3 })); 
                    }, data.d.heartbeat_interval);
                }
                if (data.t === "INIT_STATE" || data.t === "PRESENCE_UPDATE") { 
                    updatePresence(data.d || data);
                }
            } catch(e) {}
        };

        setInterval(async () => {
            try {
                const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
                const data = await res.json();
                if(data.success) updatePresence(data.data);
            } catch(e) {}
        }, 5000);

        function updatePresence(data) {
            const statusDiv = document.getElementById('discord-status');
            if(statusDiv) statusDiv.className = 'status-indicator ' + data.discord_status;

            if (data.discord_status === 'offline') {
                if (!isOfflineMode) {
                    isOfflineMode = true;
                    const timeAgo = formatTimeAgo(lastOnlineTimestamp);
                    if(hasClicked) startTyped(`Đã offline ${timeAgo}`);
                }
            } else {
                if (isOfflineMode) {
                    isOfflineMode = false;
                    if(hasClicked) startTyped(originalBio);
                }
            }

            if(data.discord_user) {
                const nameEl = document.getElementById('user-name');
                const tagEl = document.getElementById('user-tag');
                const avatarEl = document.getElementById('user-avatar');
                const decorationEl = document.getElementById('user-decoration');

                if(nameEl) nameEl.innerHTML = (data.discord_user.global_name || data.discord_user.username) + ' <i class="fas fa-circle-check verify-badge"></i>';
                if(tagEl) tagEl.innerText = '@' + data.discord_user.username;
                if(avatarEl && data.discord_user.avatar) {
                    const ext = data.discord_user.avatar.startsWith("a_") ? "gif" : "png";
                    avatarEl.src = `https://cdn.discordapp.com/avatars/${DISCORD_ID}/${data.discord_user.avatar}.${ext}?size=1024`;
                }

                if(decorationEl) {
                    if(data.discord_user.avatar_decoration_data) {
                        decorationEl.src = `https://cdn.discordapp.com/avatar-decoration-presets/${data.discord_user.avatar_decoration_data.asset}.png?size=240&passthrough=true`;
                        decorationEl.style.display = 'block';
                    } else {
                        decorationEl.style.display = 'none';
                    }
                }
            }

            const bubbleEl = document.getElementById('status-bubble');
            const customStatus = data.activities.find(a => a.type === 4);
            
            if (customStatus && bubbleEl) {
                let html = "";
                if (customStatus.emoji) {
                    if (customStatus.emoji.id) {
                        html += `<img src="https://cdn.discordapp.com/emojis/${customStatus.emoji.id}.png?size=24" style="width:20px; vertical-align:middle; margin-right:4px;">`;
                    } else {
                        html += `<span style="margin-right:4px;">${customStatus.emoji.name}</span>`;
                    }
                }
                if (customStatus.state) html += customStatus.state;
                bubbleEl.innerHTML = html;
                bubbleEl.style.display = 'flex';
            } else if (bubbleEl) {
                bubbleEl.style.display = 'none';
            }

            const activity = data.activities.find(a => a.type === 0);
            const card = document.getElementById('activity-card');
            
            if(!activity) { 
                if(card) card.style.display = 'none';
                return; 
            }
            if(card) { 
                card.style.display = 'flex';
                if(overlay.style.opacity === '0') { card.classList.add('anim-active'); } 
            }

            const nameEl = document.getElementById('act-name');
            const detailsEl = document.getElementById('act-details'); 
            const stateEl = document.getElementById('act-state');
            const lgImg = document.getElementById('act-image'); 
            const smImg = document.getElementById('act-small-image'); 
            const placeholder = document.getElementById('act-placeholder');
            const timer = document.getElementById('act-timer');

            if(nameEl) nameEl.innerText = activity.name;
            if(detailsEl) detailsEl.innerText = activity.details || "";
            if(stateEl) { 
                if (activity.state) { 
                    stateEl.innerText = activity.state;
                    stateEl.style.display = "block"; 
                } else { 
                    stateEl.style.display = "none";
                } 
            }

            function getUrl(appId, assetId) {
                if(!assetId) return null;
                if(assetId.startsWith("mp:external/")) return `https://media.discordapp.net/external/${assetId.replace("mp:external/", "")}`;
                if(assetId.startsWith("mp:")) return assetId.replace("mp:", "https://media.discordapp.net/");
                return `https://cdn.discordapp.com/app-assets/${appId}/${assetId}.png`;
            }

            if (activity.assets && activity.assets.large_image) {
                const url = getUrl(activity.application_id, activity.assets.large_image);
                if(lgImg) { lgImg.src = url; lgImg.style.display = 'block'; }
                if(placeholder) placeholder.style.display = 'none';
            } else {
                if(lgImg) lgImg.style.display = 'none';
                if(placeholder) { 
                    placeholder.style.display = 'flex';
                    const isCode = (activity.name === "Code" || activity.application_id === "383226322780274689"); 
                    placeholder.innerHTML = isCode ? '<i class="fas fa-code"></i>' : '<i class="fas fa-gamepad"></i>'; 
                }
            }

            if (activity.assets && activity.assets.small_image) {
                const url = getUrl(activity.application_id, activity.assets.small_image);
                if(smImg) { smImg.src = url; smImg.style.display = 'block'; }
            } else { 
                if(smImg) smImg.style.display = 'none';
            }
            
            if (activity.timestamps && activity.timestamps.start) {
                if(timer) { 
                    timer.style.display = 'block';
                    timer.setAttribute('data-start', activity.timestamps.start); 
                }
            } else { 
                if(timer) timer.style.display = 'none';
            }
        }

        const targetTitle = "mizuhara | Profile";
        let titleIndex = 0; 
        let isDeleting = false;

        function animateTitle() {
            if (!isDeleting && titleIndex <= targetTitle.length) { 
                document.title = targetTitle.substring(0, titleIndex + 1);
                titleIndex++; 
                if (titleIndex > targetTitle.length) { 
                    isDeleting = true;
                    setTimeout(animateTitle, 2000); 
                    return; 
                } 
            } else if (isDeleting && titleIndex >= 0) { 
                document.title = targetTitle.substring(0, titleIndex);
                titleIndex--; 
                if (titleIndex < 0) { 
                    isDeleting = false;
                    titleIndex = 0; 
                } 
            }
            setTimeout(animateTitle, isDeleting ? 200 : 300);
        }
        animateTitle();
        
        setInterval(() => {
            const timerEl = document.getElementById('act-timer');
            if (!timerEl || timerEl.style.display === 'none') return;
            
            const startTimestamp = parseInt(timerEl.getAttribute('data-start'));
            if(!startTimestamp) return;
            
            const diff = Date.now() - startTimestamp;
            const hours = Math.floor(diff / 3600000); 
            const minutes = Math.floor((diff % 3600000) / 60000); 
            const seconds = Math.floor((diff % 60000) / 1000);
            
            let timeString = ""; 
            if (hours > 0) timeString += `${hours}:`;
            timeString += `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            timerEl.innerText = timeString + " elapsed";
        }, 1000);
    </script>
</body>
</html>

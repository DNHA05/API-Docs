<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZEN-API | Documentation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <style>
    :root {
      --bg: #050505;
      --bg-soft: #101010;
      --card: rgba(14, 14, 14, 0.9);
      --border: rgba(255, 255, 255, 0.14);
      --text: #f3f3f3;
      --muted: #a3a3a3;
      --accent: #ffffff;
      --accent-2: #d4d4d4;
      --success: #22c55e;
      --method: #f59e0b;
      --code-bg: #0a0a0a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Sora", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 500px at 80% -10%, rgba(255, 255, 255, 0.08), transparent 60%),
        radial-gradient(900px 600px at -10% 10%, rgba(255, 255, 255, 0.06), transparent 60%),
        linear-gradient(160deg, #020202 0%, #090909 50%, #000000 100%);
      min-height: 100vh;
    }

    .shell {
      width: min(1120px, 92vw);
      margin: 40px auto 70px;
      position: relative;
    }

    .hero {
      border: 1px solid var(--border);
      background: linear-gradient(145deg, rgba(18, 18, 18, 0.96), rgba(9, 9, 9, 0.92));
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 25px 70px rgba(2, 6, 23, 0.45);
    }

    .badge {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      color: #ededed;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 14px 0 10px;
      font-size: clamp(28px, 3.5vw, 44px);
      line-height: 1.06;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      max-width: 760px;
      line-height: 1.6;
    }

    .toolbar {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(2, minmax(180px, 1fr));
      gap: 12px;
    }

    .field {
      background: rgba(12, 12, 12, 0.85);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .field input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-family: "IBM Plex Mono", monospace;
      font-size: 13px;
    }

    .endpoint-grid {
      margin-top: 22px;
      display: grid;
      gap: 14px;
    }

    .endpoint-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--card);
      backdrop-filter: blur(3px);
      overflow: hidden;
    }

    .endpoint-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      align-items: center;
      flex-wrap: wrap;
    }

    .method {
      display: inline-block;
      font-family: "IBM Plex Mono", monospace;
      color: var(--method);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid rgba(245, 158, 11, 0.35);
      border-radius: 8px;
      padding: 5px 8px;
      font-weight: 500;
      margin-bottom: 10px;
    }

    .path {
      font-family: "IBM Plex Mono", monospace;
      font-size: 14px;
      color: #f5f5f5;
      margin-top: 2px;
      word-break: break-all;
    }

    .summary {
      color: var(--muted);
      margin: 8px 0 0;
      font-size: 14px;
    }

    .endpoint-example {
      margin: 0 0 10px;
      color: #d4d4d4;
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      word-break: break-all;
    }

    .endpoint-body {
      padding: 14px 18px 18px;
    }

    .tabs {
      display: inline-flex;
      gap: 6px;
      background: rgba(20, 20, 20, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 12px;
      padding: 5px;
      margin-bottom: 10px;
    }

    .tab-btn {
      border: 0;
      cursor: pointer;
      color: var(--muted);
      background: transparent;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      font-family: "Sora", sans-serif;
    }

    .tab-btn.active {
      background: linear-gradient(130deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.12));
      color: #ffffff;
    }

    pre {
      margin: 0;
      background: var(--code-bg);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      padding: 14px;
      overflow-x: auto;
    }

    .code-meta {
      margin-bottom: 8px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: "IBM Plex Mono", monospace;
    }

    .code-meta.node {
      color: #86efac;
    }

    .code-meta.python {
      color: #93c5fd;
    }

    .code-meta.curl {
      color: #fcd34d;
    }

    code {
      font-family: "IBM Plex Mono", monospace;
      font-size: 13px;
      line-height: 1.6;
      color: #f5f5f5;
      white-space: pre;
    }

    .hljs {
      background: transparent !important;
      padding: 0 !important;
    }

    .response-list {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .test-row {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .test-btn {
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: #141414;
      color: #f5f5f5;
      border-radius: 9px;
      padding: 8px 12px;
      font-family: "Sora", sans-serif;
      font-size: 12px;
      cursor: pointer;
    }

    .test-btn:hover {
      border-color: rgba(255, 255, 255, 0.45);
    }

    .test-status {
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      color: var(--muted);
      padding: 6px 9px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.02);
    }

    .test-status.loading {
      color: #fcd34d;
      border-color: rgba(252, 211, 77, 0.45);
    }

    .test-status.ok {
      color: #86efac;
      border-color: rgba(34, 197, 94, 0.45);
    }

    .test-status.err {
      color: #fca5a5;
      border-color: rgba(239, 68, 68, 0.45);
    }

    .test-output {
      margin-top: 10px;
    }

    .test-output pre {
      min-height: 170px;
      max-height: 320px;
      overflow: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(245, 158, 11, 0.7) rgba(255, 255, 255, 0.08);
    }

    .test-output pre::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .test-output pre::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 10px;
    }

    .test-output pre::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(245, 158, 11, 0.88), rgba(245, 158, 11, 0.62));
      border-radius: 10px;
      border: 2px solid rgba(10, 10, 10, 0.95);
    }

    .test-output pre::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(245, 158, 11, 1), rgba(245, 158, 11, 0.78));
    }

    .response-chip {
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      padding: 6px 9px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: var(--muted);
    }

    .response-chip.ok {
      border-color: rgba(34, 197, 94, 0.45);
      color: #86efac;
    }

    @media (max-width: 860px) {
      .toolbar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <span class="badge">ZEN-API | Documentation</span>
      <h1>Endpoint Docs With Ready-to-Run Examples</h1>
      <p class="subtitle">
        Documentation of ZEN-API endpoints. Update the API key and sample target URL below to generate live examples for Node.js, Python, and curl.
      </p>
      <div class="toolbar">
        <div class="field">
          <label for="apiKeyInput">x-api-key</label>
          <input id="apiKeyInput" value="YOUR_API_KEY" />
        </div>
        <div class="field">
          <label for="targetUrlInput">Sample url query</label>
          <input id="targetUrlInput" value="https://link-center.net/3476997/LlKUzgAy1bUT" />
        </div>
      </div>
    </section>
    <section class="endpoint-grid" id="endpointGrid"></section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    const API_BASE_URL = "https://api.izen.lol";
    const langByPath = {};
    const state = {
      baseUrl: API_BASE_URL,
      apiKey: "YOUR_API_KEY",
      sampleUrl: "https://link-center.net/3476997/LlKUzgAy1bUT",
      spec: null
    };

    const apiKeyInput = document.getElementById("apiKeyInput");
    const targetUrlInput = document.getElementById("targetUrlInput");
    const endpointGrid = document.getElementById("endpointGrid");

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function getEndpointCode(path, method, lang) {
      const urlWithQuery = buildRequestUrl(path);

      if (lang === "node") {
        return `const endpoint = "${urlWithQuery}";

const response = await fetch(endpoint, {
  method: "${method.toUpperCase()}",
  headers: {
    "x-api-key": "${state.apiKey}"
  }
});

const data = await response.json();
console.log(data);`;
      }

      if (lang === "python") {
        return `import requests

endpoint = "${urlWithQuery}"
headers = {"x-api-key": "${state.apiKey}"}

response = requests.${method.toLowerCase()}(endpoint, headers=headers, timeout=30)
print(response.status_code)
print(response.json())`;
      }

      return `curl -X ${method.toUpperCase()} "${urlWithQuery}" \\
  -H "x-api-key: ${state.apiKey}"`;
    }

    function buildRequestUrl(path) {
      const base = state.baseUrl.replace(/\/+$/, "");
      const encodedTarget = encodeURIComponent(state.sampleUrl);
      return path === "/v1/supported"
        ? `${base}${path}`
        : `${base}${path}?url=${encodedTarget}`;
    }

    function buildEndpointTemplate(path) {
      return path === "/v1/supported"
        ? `${API_BASE_URL}${path}`
        : `${API_BASE_URL}${path}?url={encodedurl}`;
    }

    function renderLiveTester(path, method) {
      return `
        <div class="test-row">
          <button class="test-btn" type="button" data-test-path="${path}" data-test-method="${method}">Test</button>
          <span class="test-status" data-test-status="${path}">Ready</span>
        </div>
        <div class="test-output">
          <pre><code data-test-output="${path}">// Response will appear here</code></pre>
        </div>
      `;
    }

    function renderTabs(path, method) {
      const currentLang = langByPath[path] || "node";
      const syntaxByLang = {
        node: "javascript",
        python: "python",
        curl: "bash"
      };
      const labelByLang = {
        node: "NODEJS",
        python: "PYTHON",
        curl: "CURL"
      };
      const tabs = [
        { key: "node", label: "NODEJS" },
        { key: "python", label: "PYTHON" },
        { key: "curl", label: "CURL" }
      ];

      return `
        <div class="tabs">
          ${tabs.map((tab) => `
            <button
              class="tab-btn ${tab.key === currentLang ? "active" : ""}"
              data-path="${path}"
              data-lang="${tab.key}"
              type="button"
            >${tab.label}</button>
          `).join("")}
        </div>
        <div class="code-meta ${currentLang}">${labelByLang[currentLang]}</div>
        <pre><code class="language-${syntaxByLang[currentLang]}">${escapeHtml(getEndpointCode(path, method, currentLang))}</code></pre>
      `;
    }

    function renderEndpoints() {
      const entries = Object.entries(state.spec.paths || {});
      endpointGrid.innerHTML = entries.map(([path, operations]) => {
        const method = Object.keys(operations)[0];
        const op = operations[method];
        const responses = Object.keys(op.responses || {});
        return `
          <article class="endpoint-card">
            <header class="endpoint-head">
              <div>
                <span class="method">${method}</span>
                <div class="path">${path}</div>
                <p class="summary">${escapeHtml(op.summary || "No summary")}</p>
              </div>
            </header>
            <div class="endpoint-body">
              <p class="endpoint-example">Example: ${escapeHtml(buildEndpointTemplate(path))}</p>
              ${renderTabs(path, method)}
              ${renderLiveTester(path, method)}
              <div class="response-list">
                ${responses.map((code) => `<span class="response-chip ${String(code).startsWith("2") ? "ok" : ""}">${code}</span>`).join("")}
              </div>
            </div>
          </article>
        `;
      }).join("");

      endpointGrid.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const path = btn.getAttribute("data-path");
          const lang = btn.getAttribute("data-lang");
          if (!path || !lang) return;
          langByPath[path] = lang;
          renderEndpoints();
        });
      });

      endpointGrid.querySelectorAll(".test-btn").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const path = btn.getAttribute("data-test-path");
          const method = btn.getAttribute("data-test-method");
          if (!path || !method) return;

          const statusEl = endpointGrid.querySelector(`[data-test-status="${CSS.escape(path)}"]`);
          const outputEl = endpointGrid.querySelector(`[data-test-output="${CSS.escape(path)}"]`);
          if (!statusEl || !outputEl) return;

          const url = buildRequestUrl(path);
          statusEl.className = "test-status loading";
          statusEl.textContent = "Loading...";
          outputEl.textContent = "";

          try {
            const response = await fetch(url, {
              method: method.toUpperCase(),
              headers: {
                "x-api-key": state.apiKey
              }
            });

            const raw = await response.text();
            let parsed;
            try {
              parsed = JSON.parse(raw);
            } catch {
              parsed = raw;
            }

            statusEl.className = `test-status ${response.ok ? "ok" : "err"}`;
            statusEl.textContent = `Status ${response.status}`;
            outputEl.textContent = typeof parsed === "string"
              ? parsed
              : JSON.stringify(parsed, null, 2);
          } catch (err) {
            statusEl.className = "test-status err";
            statusEl.textContent = "Request failed";
            outputEl.textContent = String(err);
          }

          if (window.hljs) {
            outputEl.className = "language-json";
            delete outputEl.dataset.highlighted;
            window.hljs.highlightElement(outputEl);
          }
        });
      });

      if (window.hljs) {
        endpointGrid.querySelectorAll("pre code").forEach((block) => {
          delete block.dataset.highlighted;
          window.hljs.highlightElement(block);
        });
      }
    }

    async function initDocs() {
      try {
        const response = await fetch("/docs/openapi.json");
        state.spec = await response.json();

        apiKeyInput.addEventListener("input", () => {
          state.apiKey = apiKeyInput.value.trim() || "YOUR_API_KEY";
          renderEndpoints();
        });
        targetUrlInput.addEventListener("input", () => {
          state.sampleUrl = targetUrlInput.value.trim() || "https://linkvertise.com/";
          renderEndpoints();
        });

        renderEndpoints();
      } catch (err) {
        endpointGrid.innerHTML = `<article class="endpoint-card"><div class="endpoint-body">Failed to load OpenAPI spec.</div></article>`;
      }
    }

    initDocs();
  </script>
</body>
</html>
